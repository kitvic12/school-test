<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель учителя</title>
    <link rel="icon" href="/ST.ico">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/teacher/style.css">
</head>
<body>
    <div id="loginSection">
        <main class="login-form">
            <h1>Вход для учителя</h1>
            <form id="loginForm">
                <p><input type="text" id="username" placeholder="Логин" required></p>
                <p><input type="password" id="password" placeholder="Пароль" required></p>
                <p><button type="submit">Войти</button></p>
            </form>
            <div id="loginError" style="color: red; margin-top: 15px;"></div>
        </main>
    </div>

    <div id="teacherSection" style="display: none;">
        <main class="teacher-panel">
            <h1>📊 Панель учителя</h1>
            <div class="controls"><span id="variant-btns">
                <button id="startPowers" class="variant-btn" style="display: inline-block;">🎯 Степени двойки</button>
                <button id="startSquares" class="variant-btn" style="display: inline-block;">🔢 Квадраты чисел</button></span>
                <button id="stopBtn" class="stop-btn" style="display: none;">⏹️ Остановить тест</button>
                <button id="newBtn" class="variant-btn" style="display: none;">🎯Новый тест🔢</button>
                <button id="finalizeBtn" class="finalize-btn" style="display: none;">🗑️ Завершить тест</button>
                <button id="reloadBtn" class="variant-btn">🔄 Перезагрузить данные</button>
                <button id="logoutBtn" class="logout-btn">Выйти</button>
            </div>
            <div id="activeTestInfo" class="status-info" style="display: none;">
                <h3>✅ Тестирование запущено</h3>
                <p id="what_open"></p>
            </div>

            <table class="results-table">
                <thead>
                    <tr>
                        <th>№ ПК</th>
                        <th>Фамилия</th>
                        <th>IP</th>
                        <th>Правильных</th>
                        <th>Баллы</th>
                        <th>Оценка</th>
                        <th>Действие</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    <tr><td colspan="6" class="empty">Нет зарегистрированных учеников</td></tr>
                </tbody>
            </table>
        </main>

        <main class="teacher-panel" id="settingsSection">
            <h1>⚙️ Настройки</h1>
            <form id="settingsForm">
            </form>
            <div id="settingsMessage" style="color: green; margin-top: 15px;"></div>
    </div>


    <script src="/static/teacher/script.js" defer></script>
</body>
</html>
